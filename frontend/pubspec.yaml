name: zhvi_prediction
description: Zillow Home Value Index Prediction Flutter Web App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.2.2

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Maps (OpenStreetMap, no API key required)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Date/number formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.
    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder element to allow serving the deployed app from a
    non-root path (like /myapp/) by changing the href value below to the path
    (like /myapp/). If not required, consider removing it.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Accra Home Price Index – Ghana real estate analytics">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AHPI">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Accra Home Price Index</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0D1117;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    #loading p {
      color: #8b949e;
      font-family: -apple-system, sans-serif;
      font-size: 14px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #30363d;
      border-top-color: #4CAF50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading indicator shown while Flutter initialises -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Accra Home Price Index…</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
